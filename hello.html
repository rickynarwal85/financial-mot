<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Narwal Family</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0f7fa, #e8eaf6, #fce4ec);
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    }

    h1 {
      font-size: 4rem;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
      background-size: 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow 4s linear infinite;
      text-align: center;
      margin-bottom: 2rem;
      text-shadow: none;
      filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.15));
    }

    @keyframes rainbow {
      0%   { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    svg {
      width: 320px;
      height: 220px;
      filter: drop-shadow(4px 6px 12px rgba(80, 120, 200, 0.3));
    }
  </style>
</head>
<body>
  <h1>Hello Narwal Family!</h1>

  <!-- Narwhal SVG illustration -->
  <svg viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
    <!-- Ocean background -->
    <ellipse cx="160" cy="180" rx="155" ry="35" fill="#b3e5fc" opacity="0.5"/>

    <!-- Tail fins -->
    <ellipse cx="272" cy="118" rx="28" ry="12" fill="#7c4dff" transform="rotate(30 272 118)"/>
    <ellipse cx="272" cy="102" rx="28" ry="12" fill="#9c6fff" transform="rotate(-30 272 102)"/>

    <!-- Body -->
    <ellipse cx="155" cy="110" rx="115" ry="52" fill="#b39ddb"/>
    <ellipse cx="145" cy="110" rx="105" ry="44" fill="#ce93d8"/>

    <!-- Belly -->
    <ellipse cx="140" cy="122" rx="80" ry="26" fill="#f3e5f5"/>

    <!-- Spots -->
    <circle cx="100" cy="95" r="8" fill="#9c6fff" opacity="0.4"/>
    <circle cx="130" cy="82" r="5" fill="#9c6fff" opacity="0.3"/>
    <circle cx="165" cy="90" r="6" fill="#9c6fff" opacity="0.35"/>

    <!-- Dorsal fin -->
    <polygon points="160,62 175,90 145,90" fill="#7c4dff" opacity="0.8"/>

    <!-- Head -->
    <ellipse cx="52" cy="108" rx="45" ry="38" fill="#ce93d8"/>
    <ellipse cx="48" cy="110" rx="38" ry="30" fill="#e1bee7"/>

    <!-- Horn (tusk) -->
    <line x1="18" y1="96" x2="-48" y2="60" stroke="#ffe082" stroke-width="7" stroke-linecap="round"/>
    <line x1="18" y1="96" x2="-48" y2="60" stroke="#fff9c4" stroke-width="3" stroke-linecap="round" stroke-dasharray="6,6"/>

    <!-- Eye -->
    <circle cx="38" cy="98" r="8" fill="white"/>
    <circle cx="40" cy="98" r="5" fill="#311b92"/>
    <circle cx="42" cy="96" r="2" fill="white"/>

    <!-- Smile -->
    <path d="M 30 118 Q 45 128 58 118" stroke="#7c4dff" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Bubbles -->
    <circle cx="20" cy="70" r="5" fill="none" stroke="#81d4fa" stroke-width="1.5" opacity="0.7"/>
    <circle cx="10" cy="52" r="3" fill="none" stroke="#81d4fa" stroke-width="1.5" opacity="0.6"/>
    <circle cx="28" cy="42" r="4" fill="none" stroke="#81d4fa" stroke-width="1.5" opacity="0.5"/>

    <!-- Flipper -->
    <ellipse cx="105" cy="148" rx="30" ry="14" fill="#9c6fff" transform="rotate(20 105 148)" opacity="0.85"/>
  </svg>
</body>
</html>
